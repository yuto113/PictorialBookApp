<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet 地図学習サンプル（国土地理院タイル）</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* 2. 地図を表示する範囲のサイズを指定する（必須） */
        #map {
            width: 100%;
            height: 600px;
        }
        body {
            font-family: sans-serif;
            margin: 20px;
        }
    </style>
</head>
<body>

    <h2>Leaflet × 国土地理院タイル</h2>
    <p>地図をクリックした場所にピンを移動させたり、吹き出しを表示したりできます。</p>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- 地図の初期設定 ---
        
        // 地図の中心（緯度, 経度）とズームレベルを設定
        const map = L.map('map').setView([35.125695, 136.918672], 15);

        // --- タイルレイヤー（国土地理院）の追加 ---
        
        // 著作権表記（attribution）に国土地理院のルールを適用
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
            attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>地理院タイル</a>"
        }).addTo(map);

        // --- マーカー（ピン）の追加 ---

        // マーカーを作成して地図に追加（例: dot.labo）
        const marker = L.marker([35.125695, 136.918672]).addTo(map);
        marker.bindPopup("<b>ここはdot.labo神宮前校です</b><br>10:00~ プログラミング頑張ろう！").openPopup();

        // もう一つの固定マーカー（例: 自宅）
        const marker2 = L.marker([35.128277, 136.903349]).addTo(map);
        marker2.bindPopup("<b>ここは家です</b><br>早く帰ろう！");

        // --- 主要地点の固定ピン（都道府県ごとに複数） ---
        const prefectures = {
            "東京都": [
                { name: "東京駅", coords: [35.681236, 139.767125] },
                { name: "渋谷スクランブル交差点", coords: [35.659494, 139.700553] },
                { name: "新宿駅（西口）", coords: [35.690921, 139.700258] },
                { name: "浅草寺", coords: [35.714765, 139.796655] },
                { name: "東京タワー", coords: [35.6585805, 139.7454329] },
                { name: "東京スカイツリー", coords: [35.7100627, 139.8107004] },
                { name: "上野公園", coords: [35.713768, 139.774473] },
                { name: "明治神宮", coords: [35.676397, 139.699325] },
                { name: "銀座", coords: [35.671667, 139.764444] },
                { name: "六本木ヒルズ", coords: [35.660507, 139.729135] }
            ],
            "愛知県": [
                { name: "名古屋駅", coords: [35.170915, 136.881537] },
                { name: "名古屋城", coords: [35.185167, 136.89957] },
                { name: "大須観音（大須商店街）", coords: [35.154722, 136.906389] },
                { name: "栄（久屋大通）", coords: [35.170282, 136.905569] },
                { name: "熱田神宮", coords: [35.14311, 136.906611] },
                { name: "レゴランド・ジャパン", coords: [35.1175, 136.8997] },
                { name: "豊田スタジアム（豊田市）", coords: [35.084722, 137.156389] },
                { name: "トヨタ産業技術記念館", coords: [35.162223, 136.883643] },
                { name: "岡崎城", coords: [34.948056, 137.163611] },
                { name: "東山動植物園", coords: [35.148056, 136.985278] }
            ],
            "大阪府": [
                { name: "大阪駅（梅田）", coords: [34.702485, 135.495951] },
                { name: "大阪城", coords: [34.687315, 135.526201] },
                { name: "道頓堀（戎橋）", coords: [34.668702, 135.501777] },
                { name: "なんば（ミナミ）", coords: [34.664567, 135.501256] },
                { name: "梅田スカイビル（空中庭園）", coords: [34.705332, 135.489538] },
                { name: "天王寺（通天閣）", coords: [34.654931, 135.513175] },
                { name: "海遊館（大阪水族館）", coords: [34.654095, 135.428333] },
                { name: "ユニバーサル・スタジオ・ジャパン", coords: [34.669419, 135.432446] },
                { name: "住吉大社", coords: [34.607506, 135.498652] },
                { name: "四天王寺", coords: [34.651389, 135.513333] }
            ]
        };

        Object.keys(prefectures).forEach(function(pref) {
            prefectures[pref].forEach(function(p) {
                L.marker(p.coords).addTo(map).bindPopup("<b>" + p.name + "</b><br>" + pref);
            });
        });

        // --- クリックで移動するピンの初期化（存在しなかった marker3 を定義） ---
        const marker3 = L.marker(map.getCenter()).addTo(map);

        // クリックした場所にピンを移動させる機能
        map.on('click', function(e) {
            // クリックした地点の緯度・経度を取得
            const latlng = e.latlng;
            // マーカーの位置を更新
            marker3.setLatLng(latlng);
            // ポップアップの内容も書き換えて表示
            marker3.setPopupContent("座標: " + latlng.toString()).openPopup();
        });
    </script>

</body>
</html>
