<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>プロフィール編集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fff7f0 0%, #f0f9ff 100%);
            color: #333;
            min-height: 100vh;
        }

        .brand-color {
            color: #ff6b6b;
        }

        .card-edit {
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <a href="/profile/{{ user.id }}" class="btn btn-sm btn-outline-secondary mb-3">← 戻る</a>

                <div class="card card-edit p-4 bg-white">
                    <h3 class="text-center mb-4 brand-color">プロフィール編集</h3>

                    <form method="post" enctype="multipart/form-data">
                        <div class="mb-4 text-center">
                            <label class="form-label d-block">現在のアイコン</label>
                            {% if user.icon_image and user.icon_image.startswith('http') %}
                            <img src="{{ user.icon_image }}" width="120" height="120"
                                class="rounded-circle border mb-3 shadow-sm" style="object-fit: cover;">
                            {% else %}
                            <img src="{{ url_for('static', filename='icons/default.png') }}" width="120" height="120"
                                class="rounded-circle border mb-3 shadow-sm" style="object-fit: cover;">
                            {% endif %}
                        </div>

                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">なまえ</label>
                            <input type="text" id="name" name="name" class="form-control" value="{{ user.name }}"
                                required>
                        </div>

                        <div class="mb-4">
                            <label for="icon_file" class="form-label fw-bold">新しいアイコン画像をアップロード</label>
                            <input type="file" id="icon_file" name="icon_file" class="form-control" accept="image/*">
                            <div class="form-text">正方形に近い画像がおすすめです！</div>
                        </div>

                        <button type="submit" class="btn btn-danger w-100 py-2 shadow-sm fw-bold">変更を保存する！</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
