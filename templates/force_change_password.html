<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>パスワード変更</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fff7f0 0%, #f0f9ff 100%);
            color: #333;
            min-height: 100vh;
        }

        .brand-color {
            color: #ff6b6b;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 p-4" style="border-radius:1.5rem;">
                    <h3 class="brand-color text-center fw-bold mb-3">🔑 パスワードの変更</h3>
                    <div class="alert alert-warning">
                        <strong>⚠️ パスワードがリセットされました</strong><br>
                        管理者によりパスワードがリセットされました。新しいパスワードを設定してください。
                    </div>

                    {% if message %}
                    <div class="alert alert-danger">{{ message }}</div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">新しいパスワード</label>
                            <input type="password" name="new_password" class="form-control" required minlength="1"
                                maxlength="10">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">新しいパスワード（確認）</label>
                            <input type="password" name="new_password2" class="form-control" required minlength="1"
                                maxlength="10">
                        </div>
                        <button type="submit" class="btn btn-danger w-100">パスワードを変更する</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
