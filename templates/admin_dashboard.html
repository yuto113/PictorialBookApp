<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理ダッシュボード</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #fff7f0 0%, #f0f9ff 100%); color: #333; min-height: 100vh; }
        .brand-color { color: #ff6b6b; }
        .footer { color: #666; padding: 1rem 0; }
        .admin-card {
            border-radius: 1.5rem;
            transition: all 0.3s;
            cursor: pointer;
            border: 3px solid transparent;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            background: white;
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 3rem 2rem;
            text-align: center;
            height: 100%;
        }
        .admin-card:hover {
            transform: translateY(-10px);
            border-color: #ff9a9e;
            box-shadow: 0 15px 40px rgba(255,107,107,0.15);
            color: #333;
        }
        .admin-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            display: inline-block;
        }
        .admin-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .admin-desc {
            color: #666;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/user">
                <span class="fs-4 brand-color">図鑑</span>
                <small class="text-muted ms-2">管理ダッシュボード</small>
            </a>
            <a class="btn btn-sm btn-outline-secondary" href="/user">ホームへ</a>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="brand-color text-center fw-bold mb-2">⚙️ 管理ダッシュボード</h2>
        <p class="text-center text-muted mb-5">管理機能を選択してください</p>

        <div class="row g-4">
            <div class="col-md-6">
                <a href="/feedback/admin" class="admin-card">
                    <div class="admin-icon">📬</div>
                    <div class="admin-title">フィードバック管理</div>
                    <div class="admin-desc">ユーザーからの意見・要望を確認・対応</div>
                </a>
            </div>
            <div class="col-md-6">
                <a href="/admin/reviews" class="admin-card">
                    <div class="admin-icon">⭐</div>
                    <div class="admin-title">レビュー管理</div>
                    <div class="admin-desc">投稿されたレビューを承認・削除</div>
                </a>
            </div>
            <div class="col-md-6">
                <a href="/users" class="admin-card">
                    <div class="admin-icon">👥</div>
                    <div class="admin-title">ユーザー一覧</div>
                    <div class="admin-desc">登録ユーザーの管理・パスワード確認</div>
                </a>
            </div>
            <div class="col-md-6">
                <a href="/admin/schools" class="admin-card">
                    <div class="admin-icon">🏫</div>
                    <div class="admin-title">学校管理</div>
                    <div class="admin-desc">学校の作成・停止・コード発行</div>
                </a>
            </div>
        </div>
    </div>

    <footer class="footer text-center mt-4">
        <div class="container">
            <small>© {{ now().year }} 図鑑 — {{ verj }}</small>
        </div>
    </footer>
</body>
</html>
