<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>学校グループに参加</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f0fff4 0%, #f0f9ff 100%); color: #333; }
        .brand-color { color: #28a745; }
        .footer { color: #666; padding: 1rem 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/user">
                <span class="fs-4 brand-color">図鑑</span>
                <small class="text-muted ms-2">オンライン図鑑</small>
            </a>
            <a class="btn btn-sm btn-outline-secondary" href="/user">戻る</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm border-0" style="border-radius:1rem;">
                    <h3 class="text-center mb-4 brand-color">学校グループに参加</h3>
                    <p class="text-muted text-center small">管理者から受け取った学校コードを入力してください。</p>

                    {% if message %}
                    <div class="alert alert-danger">{{ message }}</div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">学校コード</label>
                            <input type="text" name="code" class="form-control" placeholder="例：ABC12345" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">参加する</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center">
        <div class="container">
            <small>© {{ now().year }} 図鑑 — {{ verj }}</small>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
