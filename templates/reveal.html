<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>自己情報確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <style>
        body { background: linear-gradient(135deg,#fff7f0 0%, #f0f9ff 100%); color:#333; }
        .brand-color { color: #ff6b6b; }
        .card-upload { border-radius: 1rem; box-shadow: 0 10px 30px rgba(16,24,40,0.06); }
        .footer { color: #666; padding: 1rem 0; }
        .form-control:focus { box-shadow: 0 0 0 0.2rem rgba(255,107,107,0.12); }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/user">
                <span class="fs-4 brand-color">図鑑</span>
                <small class="text-muted ms-2">オンライン図鑑</small>
            </a>
            <div>
                <a class="btn btn-sm btn-outline-secondary" href="/user">戻る</a>
            </div>
        </div>
    </nav>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card card-upload p-4 bg-white">
                    <h3 class="mb-3">自分の情報の確認・編集</h3>
                    <p class="text-muted small">確認するには現在のパスワードを入力してください。</p>

                    {% if message %}
                    <div class="alert alert-danger">{{ message }}</div>
                    {% endif %}

                    {% if revealed %}
                    <div class="alert alert-success">
                        <p><strong>id:</strong> {{ revealed.id }}</p>
                        <p><strong>name:</strong> {{ revealed.name }}</p>
                        <p><strong>password:</strong> {{ revealed.password }}</p>
                    </div>

                    <h5 class="mt-3">情報の編集</h5>
                    <form method="post">
                        <input type="hidden" name="update" value="1">
                        <div class="mb-3">
                            <label for="current_password" class="form-label">現在のパスワード（確認用）</label>
                            <input type="password" class="form-control" id="current_password" name="current_password" required minlength="1" maxlength="10">
                        </div>
                        <div class="mb-3">
                            <label for="name" class="form-label">名前</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ revealed.name }}">
                        </div>
                        <div class="mb-3">
                            <label for="new_password" class="form-label">新しいパスワード（空のままなら変更しません）</label>
                            <input type="password" class="form-control" id="new_password" name="new_password" required minlength="1" maxlength="10">
                        </div>
                        <div class="mb-3">
                            <label for="new_password2" class="form-label">新しいパスワード（確認）</label>
                            <input type="password" class="form-control" id="new_password2" name="new_password2" required minlength="1" maxlength="10">
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <button type="submit" class="btn btn-primary">更新</button>
                            <a href="/user" class="btn btn-link">ホーム画面へ</a>
                        </div>
                    </form>
                    {% else %}
                    <form method="post">
                        <div class="mb-3">
                            <label for="password" class="form-label">現在のパスワード</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <button type="submit" class="btn btn-primary">確認</button>
                            <a href="/user" class="btn btn-link">ホーム画面へ</a>
                        </div>
                    </form>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center">
        <div class="container">
            <small>© {{ now().year }} 図鑑 — {{ verj }}</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
    <script src="/static/js/index.js"></script>
</body>

</html>
