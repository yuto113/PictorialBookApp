<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理者情報確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>

<body>
    <div class="container py-4">
        <a href="/user" class="btn btn-sm btn-outline-secondary mb-3">← 戻る</a>

        <div class="card p-3 mb-3">
            <h4 class="card-title">管理者情報の確認（user_id = 2 のみ）</h4>
            <p class="text-muted small">確認するには管理者のパスワードを入力してください。</p>

            {% if message %}
            <div class="alert alert-danger">{{ message }}</div>
            {% endif %}

            {% if revealed %}
            <div class="alert alert-success">
                <p><strong>id:</strong> {{ revealed.id }}</p>
                <p><strong>name:</strong> {{ revealed.name }}</p>
                <p><strong>password:</strong> {{ revealed.password }}</p>
            </div>
            {% else %}
            <form method="post">
                <div class="mb-3">
                    <label for="password" class="form-label">管理者パスワード</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">確認</button>
            </form>
            {% endif %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>

</html>
