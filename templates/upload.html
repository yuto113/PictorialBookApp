<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>オンライン図鑑 - upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <style>
        body { background: linear-gradient(135deg,#fff7f0 0%, #f0f9ff 100%); color:#333; }
        .brand-color { color: #ff6b6b; }
        .card-upload { border-radius: 1rem; box-shadow: 0 10px 30px rgba(16,24,40,0.06); }
        .footer { color: #666; padding: 1rem 0; }
        .form-control:focus { box-shadow: 0 0 0 0.2rem rgba(255,107,107,0.12); }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/user">
                <span class="fs-4 brand-color">図鑑</span>
                <small class="text-muted ms-2">オンライン図鑑</small>
            </a>
            <div>
                <a class="btn btn-sm btn-outline-secondary" href="/user">戻る</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card card-upload p-4 bg-white">
                    <h3 class="mb-3">新しい図鑑を投稿する</h3>
                    <p class="text-muted small">写真と情報をアップロードして、みんなのコレクションに追加しましょう。</p>

                    <form method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="name" class="form-label">名前（植物・動物）</label>
                            <input type="text" id="name" name="name" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">見つけた場所</label>
                            <input type="text" id="description" name="description" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label for="file" class="form-label">画像</label>
                            <input type="file" id="file" name="file" class="form-control" required />
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <button class="btn btn-danger">送信</button>
                            <div class="text-end">
                                {% if upload %}
                                <div class="text-success">{{ upload }} をアップロードできました。</div>
                                {% endif %}
                                <a href="/user" class="btn btn-link">ホーム画面へ</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center">
        <div class="container">
            <small>© {{ now().year }} 図鑑 — みんなで作るオンライン図鑑</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>

</html>
