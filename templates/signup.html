<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>オンライン図鑑 - signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <style>
        body { background: linear-gradient(135deg,#fff7f0 0%, #f0f9ff 100%); color:#333; }
        .brand-color { color: #ff6b6b; }
        .card-auth { border-radius: 1rem; box-shadow: 0 10px 30px rgba(16,24,40,0.06); }
        .footer { color: #666; padding: 1rem 0; }
    </style>
</head>

<body>
    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <span class="fs-4 brand-color">図鑑</span>
                <small class="text-muted ms-2">オンライン図鑑</small>
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card card-auth p-4 bg-white">
                    <h3 class="mb-2">新規登録</h3>
                    <p class="text-muted small">登録名とパスワードを入力してアカウントを作成してください。</p>

                    <form method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label">登録名</label>
                            <input type="text" id="name" name="name" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label for="password_s" class="form-label">パスワード</label>
                            <input type="password" id="password_s" name="password_s" class="form-control" required minlength="1" maxlength="10" />
                        </div>

                        <div class="mb-3">
                            <label for="password_s2" class="form-label">パスワード（確認）</label>
                            <input type="password" id="password_s2" name="password_s2" class="form-control" required minlength="1" maxlength="10" />
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <button type="submit" class="btn btn-danger">登録</button>
                            <a href="/login" class="btn btn-link">ログイン画面へ</a>
                        </div>
                        <div class="mt-3">
                            {% if messege %}
                            <div class="alert alert-info">{{ messege }}</div>
                            {% endif %}
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center">
        <div class="container">
            <small>© {{ now().year }} 図鑑 — みんなで作るオンライン図鑑</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>

</html>
