<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ friend.name }}のコレクション</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js" defer
        type="text/javascript"></script>
    <style>
        /* ポップな配色 */
        body {
            background: linear-gradient(135deg, #fff7f0 0%, #f0f9ff 100%);
            color: #333;
        }

        .brand-color {
            color: #ff6b6b;
        }

        .card-tilt {
            transform: rotate(-0.5deg);
        }

        .search-input {
            border-radius: 50px;
        }

        .uploader-link {
            text-decoration: none;
        }

        .footer {
            background: transparent;
            color: #666;
            padding: 1.25rem 0;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/user">
                <span class="fs-4 brand-color">図鑑</span>
                <small class="text-muted ms-2">オンライン図鑑</small>
            </a>
            <div>
                <a class="btn btn-sm btn-outline-secondary" href="/friends">戻る</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h2 class="mb-4 brand-color">{{ friend.name }}のコレクション</h2>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
            {% for date in dates %}
            <div class="col">
                <div class="card h-100 card-tilt shadow-sm border-0" style="border-radius: 1rem;">
                    <a href="{{ url_for('static', filename='uploads/' + date.imagepass) }}" data-lightbox="group"
                        class="d-block overflow-hidden" style="border-top-left-radius:1rem; border-top-right-radius:1rem;">
                        <img src="{{ url_for('static', filename='uploads/' + date.imagepass) }}" class="card-img-top"
                            alt="{{ date.name }}" style="height:220px; object-fit:cover;">
                    </a>
                    <div class="card-body">
                        <h5 class="card-title">{{ date.name }}</h5>
                        <p class="card-text">{{ date.subject }}</p>
                        <p class="card-text small text-muted">いいね: {{ date.goodpoint }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        {% if not dates %}
        <div class="text-center">
            <p class="text-muted">{{ friend.name }}さんはまだデータをアップしていません。</p>
        </div>
        {% endif %}
    </div>

    <footer class="footer text-center">
        <div class="container">
            <small>© {{ now().year }} 図鑑 — {{ verj }}</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
    <script src="/static/js/index.js"></script>
</body>
</html>
